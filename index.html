  <style>
    body { background: linear-gradient(to top, #0f172a, #020617); height: 100vh; margin: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: serif;}
    h1 { font-size: 4rem; z-index: 10; margin: 0; text-shadow: 0 4px 20px rgba(0,0,0,0.8);}
    p { z-index: 10; font-size: 1.5rem; color: #cbd5e1; font-style: italic;}
    
    .lantern {
      position: absolute;
      width: 25px; 
      height: 40px;
      background: #fde047;
      border-radius: 4px 4px 10px 10px;
      box-shadow: 0 0 25px #ea580c, inset 0 5px 10px white;
      bottom: -60px;
      animation-name: floatSky;
      animation-iteration-count: infinite;
      animation-timing-function: linear;
      opacity: 0.8;
      z-index: 1;
    }
    
    /* The tiny flame underneath */
    .lantern::after {
      content: '';
      position: absolute;
      width: 8px; height: 12px;
      background: #ffedd5;
      bottom: -5px; left: 50%; transform: translateX(-50%);
      border-radius: 50%;
      box-shadow: 0 0 10px #f97316;
    }
    
    @keyframes floatSky {
      0% { transform: translateY(0) rotate(-5deg); opacity: 0; }
      10% { opacity: 0.9; }
      50% { transform: translateY(-60vh) rotate(5deg); }
      90% { opacity: 0.9; }
      100% { transform: translateY(-120vh) rotate(-10deg); opacity: 0; }
    }
  </style>
